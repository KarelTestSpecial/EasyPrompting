<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Easy Prompting</title>
    <link rel="stylesheet" href="pad.css">
</head>
<body>
    <div id="tabs-bar">
        <div id="tabs-list"></div>
        <button id="add-tab-btn" title="New prompt tab">+</button>
    </div>

    <textarea id="pad-area" spellcheck="true" autofocus></textarea>

    <div id="toolbar">
        <button id="copy-btn" class="primary"></button>
        <button id="clear-btn"></button>
        <div id="counter"></div>
        <div class="spacer"></div>
        <button id="font-smaller" title="Smaller text">A-</button>
        <button id="font-bigger" title="Bigger text">A+</button>
        <button id="help-btn" title="Keyboard shortcuts">?</button>
    </div>

    <div id="status-message"></div>

    <div id="help-modal" class="hidden">
        <div class="help-card">
            <h2 id="help-title"></h2>
            <ul id="help-list">
                <li><span class="key">Alt + E / R</span><span class="desc" id="hd-er"></span></li>
                <li><span class="key">Alt + 1…9</span><span class="desc" id="hd-19"></span></li>
                <li><span class="key">Alt + ← / →</span><span class="desc" id="hd-arrows"></span></li>
            </ul>
            <p id="help-tip" class="tip"></p>
            <p id="rename-hint" class="tip subtle"></p>
            <p id="sibling-note" class="tip subtle"></p>
            <button id="help-close">OK</button>
        </div>
    </div>

    <script src="pad.js"></script>
</body>
</html>
